name: Build MicroSIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32
  PLATFORM_TOOLSET: v143

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x86

      - name: Install Dependencies
        shell: pwsh
        run: |
          choco install 7zip -y
          choco install innosetup -y

      # =========================
      # FIX #1: PROPER PJSIP CLONE (NO ZIP!)
      # =========================
      - name: Clone PJSIP (FULL + SUBMODULES)
        shell: pwsh
        run: |
          if (Test-Path pjproject) {
            Remove-Item -Recurse -Force pjproject
          }

          git clone --recursive https://github.com/pjsip/pjproject.git

      # =========================
      # FIX #2: RETARGET SDK
      # =========================
      - name: Fix Windows SDK 8.1
        shell: pwsh
        run: |
          Get-ChildItem -Recurse pjproject -Filter "*.vcxproj" | ForEach-Object {
            (Get-Content $_.FullName) -replace "8.1", "10.0" |
            Set-Content $_.FullName
          }

      # =========================
      # CONFIG PJSIP (CI SAFE)
      # =========================
      - name: Configure PJSIP
        shell: pwsh
        run: |
          Set-Location pjproject

          $cfg = @(
            "#ifndef __PJ_CONFIG_SITE_H__",
            "#define __PJ_CONFIG_SITE_H__",
            "",
            "#define PJ_CONFIG_MICROSIP 1",
            "",
            "#define PJMEDIA_HAS_VIDEO 1",
            "",
            "#define PJMEDIA_HAS_FFMPEG 0",
            "#define PJMEDIA_HAS_VPX 0",
            "",
            "#define PJMEDIA_HAS_OPUS 1",
            "#define PJMEDIA_HAS_SILK 1",
            "#define PJMEDIA_HAS_G722 1",
            "#define PJMEDIA_HAS_GSM 1",
            "",
            "#define PJMEDIA_HAS_SRTP 1",
            "#define PJMEDIA_HAS_TLS 1",
            "",
            "#include <pj/config_site_sample.h>",
            "",
            "#endif"
          )

          Set-Content pjlib/include/pj/config_site.h ($cfg -join "`r`n")

      # =========================
      # BUILD PJSIP
      # =========================
      - name: Build PJSIP
        shell: pwsh
        run: |
          $sln = Get-ChildItem pjproject -Recurse -Filter "*pjproject*.sln" |
                 Select-Object -First 1

          msbuild $sln.FullName `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /m

      # =========================
      # BUILD MICROSIP
      # =========================
      - name: Build MicroSIP
        shell: pwsh
        run: |
          msbuild microsip.vcxproj `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /m

      # =========================
      # OUTPUT
      # =========================
      - name: Prepare Output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output | Out-Null
          Copy-Item Release/microsip.exe output/ -ErrorAction SilentlyContinue

      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: microsip
          path: output/
