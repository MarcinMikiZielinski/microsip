name: Build MicroSIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32
  PLATFORM_TOOLSET: v143
  SDK_VERSION: 10.0

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout MicroSIP
        uses: actions/checkout@v4

      - name: Install MFC via VS Build Tools bootstrapper
        shell: pwsh
        run: |
          Write-Host "Downloading VS 2022 Build Tools bootstrapper..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" `
            -OutFile "$env:TEMP\vs_buildtools.exe" -UseBasicParsing

          Write-Host "Installing MFC component..."
          $proc = Start-Process -FilePath "$env:TEMP\vs_buildtools.exe" -Wait -PassThru `
            -ArgumentList @(
              "--quiet", "--norestart", "--nocache",
              "--installPath", "C:\VS_MFC",
              "--add", "Microsoft.VisualStudio.Component.MFC",
              "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64"
            )
          Write-Host "Bootstrapper exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
            throw "VS Build Tools installation failed: exit code $($proc.ExitCode)"
          }

          # Verify MFC is present
          $mfc = Get-ChildItem "C:\VS_MFC" -Recurse -Filter "mfc140.lib" -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if ($mfc) { Write-Host "MFC OK: $($mfc.FullName)" }
          else       { throw "mfc140.lib not found after installation" }

          # Add MFC include/lib paths to system environment so MSBuild finds them
          $vcVer   = (Get-ChildItem "C:\VS_MFC\VC\Tools\MSVC" | Sort-Object Name -Descending | Select-Object -First 1).Name
          $mfcInc  = "C:\VS_MFC\VC\Tools\MSVC\$vcVer\atlmfc\include"
          $mfcLib  = "C:\VS_MFC\VC\Tools\MSVC\$vcVer\atlmfc\lib\x86"
          Write-Host "MFC include: $mfcInc"
          Write-Host "MFC lib:     $mfcLib"
          echo "MFC_INCLUDE=$mfcInc" >> $env:GITHUB_ENV
          echo "MFC_LIB=$mfcLib"     >> $env:GITHUB_ENV

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Clone PJSIP
        shell: pwsh
        run: git clone --depth 1 --recursive https://github.com/pjsip/pjproject.git

      - name: Fix SDK version in PJSIP projects
        shell: pwsh
        run: |
          Get-ChildItem pjproject -Recurse -Filter "*.vcxproj" | ForEach-Object {
            $c = Get-Content $_.FullName -Raw
            $c = $c -replace '<WindowsTargetPlatformVersion>[^<]+</WindowsTargetPlatformVersion>',
                              '<WindowsTargetPlatformVersion>10.0</WindowsTargetPlatformVersion>'
            Set-Content $_.FullName $c
          }

      - name: Configure PJSIP
        shell: pwsh
        run: |
          $cfg = @(
            "#ifndef __PJ_CONFIG_SITE_H__",
            "#define __PJ_CONFIG_SITE_H__",
            "#define PJ_CONFIG_MICROSIP 1",
            "#define PJMEDIA_HAS_VIDEO 0",
            "#define PJMEDIA_HAS_FFMPEG 0",
            "#define PJMEDIA_HAS_VPX 0",
            "#define PJMEDIA_HAS_OPUS 1",
            "#define PJMEDIA_HAS_G722 1",
            "#define PJMEDIA_HAS_GSM 1",
            "#define PJMEDIA_HAS_SRTP 1",
            "#include <pj/config_site_sample.h>",
            "#endif"
          )
          Set-Content pjproject/pjlib/include/pj/config_site.h ($cfg -join "`r`n")

      - name: Build PJSIP
        shell: pwsh
        run: |
          $sln = Get-ChildItem pjproject -Recurse -Filter "*pjproject*.sln" | Select-Object -First 1
          if (-not $sln) { throw "PJSIP solution not found" }
          msbuild $sln.FullName `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /p:WindowsTargetPlatformVersion=${{ env.SDK_VERSION }} `
            /m /v:m

      - name: Setup pjproject paths for MicroSIP
        shell: pwsh
        run: |
          $base = Split-Path "${{ github.workspace }}" -Parent
          $src  = "${{ github.workspace }}\pjproject"
          foreach ($dir in @("pjlib","pjlib-util","pjsip","pjmedia","pjnath")) {
            $dst = "$base\$dir"
            New-Item -ItemType Directory -Force "$dst\include" | Out-Null
            New-Item -ItemType Directory -Force "$dst\lib"     | Out-Null
            if (Test-Path "$src\$dir\include") {
              Copy-Item "$src\$dir\include\*" "$dst\include\" -Recurse -Force
            }
          }
          Get-ChildItem "$src" -Recurse -Filter "*.lib" |
            Where-Object { $_.FullName -match "Win32\\Release" } |
            ForEach-Object { Copy-Item $_.FullName "$base\pjlib\lib\" -Force }

      - name: Build MicroSIP
        shell: pwsh
        run: |
          msbuild microsip.vcxproj `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /p:WindowsTargetPlatformVersion=${{ env.SDK_VERSION }} `
            /p:AdditionalIncludeDirectories="${{ env.MFC_INCLUDE }}" `
            /p:AdditionalLibraryDirectories="${{ env.MFC_LIB }}" `
            /m /v:m

      - name: Collect output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output | Out-Null
          foreach ($p in @("Release\microsip.exe","Win32\Release\microsip.exe","x86\Release\microsip.exe")) {
            if (Test-Path $p) { Copy-Item $p output\; break }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: microsip
          path: output\
