name: Build MicroSIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32
  PLATFORM_TOOLSET: v143

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout MicroSIP
        uses: actions/checkout@v5

      # =========================
      # TOOLCHAIN
      # =========================
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x86

      - name: Install tools
        shell: pwsh
        run: |
          choco install git -y
          choco install 7zip -y

      # =========================
      # CLONE PJSIP (FULL SAFE WAY)
      # =========================
      - name: Clone PJSIP (with submodules)
        shell: pwsh
        run: |
          if (Test-Path pjproject) {
            Remove-Item -Recurse -Force pjproject
          }

          git clone --recursive https://github.com/pjsip/pjproject.git

      # =========================
      # FIX SDK (MicroSIP legacy workaround)
      # =========================
      - name: Fix Windows SDK references
        shell: pwsh
        run: |
          Get-ChildItem pjproject -Recurse -Filter "*.vcxproj" | ForEach-Object {
            (Get-Content $_.FullName) `
              -replace "8.1", "10.0" `
              -replace "10.0.22621.0", "10.0.19041.0" |
            Set-Content $_.FullName
          }

      # =========================
      # PJSIP CONFIG
      # =========================
      - name: Configure PJSIP
        shell: pwsh
        run: |
          $cfg = @(
            "#ifndef __PJ_CONFIG_SITE_H__",
            "#define __PJ_CONFIG_SITE_H__",
            "",
            "#define PJ_CONFIG_MICROSIP 1",
            "",
            "#define PJMEDIA_HAS_VIDEO 1",
            "#define PJMEDIA_HAS_FFMPEG 0",
            "#define PJMEDIA_HAS_VPX 0",
            "",
            "#define PJMEDIA_HAS_OPUS 1",
            "#define PJMEDIA_HAS_SILK 1",
            "#define PJMEDIA_HAS_G722 1",
            "#define PJMEDIA_HAS_GSM 1",
            "",
            "#define PJMEDIA_HAS_SRTP 1",
            "#define PJMEDIA_HAS_TLS 1",
            "",
            "#include <pj/config_site_sample.h>",
            "",
            "#endif"
          )

          Set-Content pjproject/pjlib/include/pj/config_site.h ($cfg -join "`r`n")

      # =========================
      # BUILD PJSIP (SAFE MSBUILD MODE)
      # =========================
      - name: Build PJSIP
        shell: pwsh
        run: |
          $sln = Get-ChildItem pjproject -Recurse -Filter "*pjproject*.sln" |
                 Select-Object -First 1

          if (-not $sln) {
            throw "PJSIP solution not found"
          }

          msbuild $sln.FullName `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /m `
            /p:WindowsTargetPlatformVersion=10.0.19041.0

      # =========================
      # BUILD MICRO SIP
      # =========================
      - name: Build MicroSIP
        shell: pwsh
        run: |
          msbuild microsip.vcxproj `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /p:WindowsTargetPlatformVersion=10.0.19041.0 `
            /m

      # =========================
      # OUTPUT
      # =========================
      - name: Prepare output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output | Out-Null

          if (Test-Path "Release/microsip.exe") {
            Copy-Item "Release/microsip.exe" output/
          } elseif (Test-Path "x86/Release/microsip.exe") {
            Copy-Item "x86/Release/microsip.exe" output/
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: microsip
          path: output/
