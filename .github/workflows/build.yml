name: Build MicroSIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32

jobs:
  build:
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x86

    - name: Install 7-Zip
      shell: pwsh
      run: |
        choco install 7zip -y

    - name: Download PJSIP Libraries
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."

        # Download MicroSIP dependencies package
        $depsUrl = "https://www.microsip.org/download/microsip-pjsip-libs.7z"
        $depsFile = "microsip-pjsip-libs.7z"

        Write-Host "Attempting to download PJSIP libraries from MicroSIP..."
        try {
            Invoke-WebRequest -Uri $depsUrl -OutFile $depsFile -TimeoutSec 60 -ErrorAction Stop
            Write-Host "Downloaded successfully"
            7z x $depsFile -y
        } catch {
            Write-Host "Could not download prebuilt libraries, will build from source"
        }

    - name: Build PJSIP from Source
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."

        # Check if PJSIP already exists
        if (Test-Path "pjlib/include/pj/config.h") {
            Write-Host "PJSIP libraries already exist, skipping build"
            exit 0
        }

        Write-Host "Building PJSIP from source..."

        # Download PJSIP
        $pjsipVersion = "2.15.1"
        $pjsipUrl = "https://github.com/pjsip/pjproject/archive/refs/tags/$pjsipVersion.zip"

        Invoke-WebRequest -Uri $pjsipUrl -OutFile "pjproject.zip"
        Expand-Archive -Path "pjproject.zip" -DestinationPath "." -Force

        if (Test-Path "pjproject-$pjsipVersion") {
            Rename-Item "pjproject-$pjsipVersion" "pjproject" -Force
        }

        Set-Location "pjproject"

        # Create config_site.h for MicroSIP
        $configSite = @"
/* MicroSIP Configuration for PJSIP */
#define PJ_CONFIG_MICROSIP 1

/* Video support */
#define PJMEDIA_HAS_VIDEO 1
#define PJMEDIA_HAS_FFMPEG 1
#define PJMEDIA_HAS_VPX 1

/* Audio codecs */
#define PJMEDIA_HAS_OPUS 1
#define PJMEDIA_HAS_SILK 1
#define PJMEDIA_HAS_G722 1
#define PJMEDIA_HAS_G7221 1
#define PJMEDIA_HAS_G726 1
#define PJMEDIA_HAS_G729 1
#define PJMEDIA_HAS_GSM 1
#define PJMEDIA_HAS_SPEEX 1
#define PJMEDIA_HAS_ILBC 1
#define PJMEDIA_HAS_AMR 1
#define PJMEDIA_HAS_AMRWB 1

/* Security */
#define PJMEDIA_HAS_SRTP 1
#define PJMEDIA_HAS_TLS 1

/* WebRTC audio processing */
#define PJMEDIA_HAS_WEBRTC_AEC 1
#define PJMEDIA_HAS_WEBRTC_VAD 1

/* Include default config */
#include <pj/config_site_sample.h>
"@

        New-Item -ItemType Directory -Force -Path "pjlib/include/pj"
        Set-Content -Path "pjlib/include/pj/config_site.h" -Value $configSite

        # Build PJSIP using Visual Studio
        Write-Host "Building PJSIP with Visual Studio..."

        # Build with MSBuild
        $msbuildPath = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\MSBuild.exe"

        # Build pjlib
        & $msbuildPath "pjlib/build/pjlib.vcxproj" /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v140
        & $msbuildPath "pjlib-util/build/pjlib-util.vcxproj" /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v140
        & $msbuildPath "pjnath/build/pjnath.vcxproj" /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v140
        & $msbuildPath "pjmedia/build/pjmedia.vcxproj" /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v140
        & $msbuildPath "pjsip/build/pjsip.vcxproj" /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v140

        Write-Host "PJSIP build completed"

    - name: Setup Third Party Libraries
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."

        # Create necessary directories
        $dirs = @(
            "third_party/lib",
            "third_party/openssl/Win32/lib",
            "third_party/ipp/Win32",
            "third_party/opus/Win32",
            "third_party/silk/Win32/Release",
            "third_party/ffmpeg/Win32",
            "third_party/vpx/Win32",
            "third_party/sdl/Win32",
            "third_party/opencore-amrnb/Win32",
            "third_party/vo-amrwbenc/Win32",
            "third_party/opencore-amrwb/Win32",
            "third_party/hid/Win32",
            "lib"
        )

        foreach ($dir in $dirs) {
            New-Item -ItemType Directory -Force -Path $dir
        }

        # Copy PJSIP libraries to lib directory
        if (Test-Path "pjproject") {
            Get-ChildItem -Path "pjproject/*/lib/*.lib" -Recurse | ForEach-Object {
                Copy-Item $_.FullName -Destination "lib/" -Force
            }
        }

    - name: Build MicroSIP
      working-directory: ${{ github.workspace }}
      run: |
        msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{env.BUILD_PLATFORM}} /p:PlatformToolset=v140 ${{env.SOLUTION_FILE_PATH}}\microsip.vcxproj

    - name: Prepare Output
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        # Create output directory
        New-Item -ItemType Directory -Force -Path "output"

        # Copy executable
        if (Test-Path "Release/microsip.exe") {
            Copy-Item "Release/microsip.exe" -Destination "output/" -Force
        }

        # Copy any DLLs
        if (Test-Path "Release/*.dll") {
            Copy-Item "Release/*.dll" -Destination "output/" -Force
        }

        # List output
        Get-ChildItem -Path "output" -Recurse

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Build
        path: ${{ github.workspace }}/output/

    - name: Create Portable ZIP
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        if (Test-Path "output/microsip.exe") {
            Compress-Archive -Path "output/*" -DestinationPath "MicroSIP-3.22.3-portable.zip" -Force
            Write-Host "Created portable ZIP archive"
        }

    - name: Upload Portable Archive
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Portable
        path: ${{ github.workspace }}/MicroSIP-*.zip

  create-installer:
    needs: build
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v4

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: MicroSIP-Build
        path: ${{ github.workspace }}/output/

    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup -y

    - name: Create Installer Script
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        $installerScript = @"
#define MyAppName "MicroSIP"
#define MyAppVersion "3.22.3"
#define MyAppPublisher "MicroSIP"
#define MyAppURL "https://www.microsip.org"
#define MyAppExeName "microsip.exe"

[Setup]
AppId={{MicroSIP-3.22.3}}
AppName={#MyAppName}
AppVersion={#MyAppVersion}
AppPublisher={#MyAppPublisher}
AppPublisherURL={#MyAppURL}
AppSupportURL={#MyAppURL}
AppUpdatesURL={#MyAppURL}
DefaultDirName={autopf}\{#MyAppName}
DisableProgramGroupPage=yes
LicenseFile=LICENSE
OutputDir=.
OutputBaseFilename=MicroSIP-3.22.3
SetupIconFile=res\microsip.ico
Compression=lzma
SolidCompression=yes
WizardStyle=modern

[Languages]
Name: "english"; MessagesFile: "compiler:Default.isl"

[Tasks]
Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

[Files]
Source: "output\{#MyAppExeName}"; DestDir: "{app}"; Flags: ignoreversion
Source: "output\*.dll"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs
Source: "LICENSE"; DestDir: "{app}"; Flags: ignoreversion

[Icons]
Name: "{autoprograms}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

[Run]
Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
"@

        Set-Content -Path "installer.iss" -Value $installerScript

    - name: Build Installer
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (Test-Path $isccPath) {
            & $isccPath "installer.iss"
            Write-Host "Installer created successfully"
        } else {
            Write-Host "Inno Setup compiler not found"
            exit 1
        }

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Installer
        path: ${{ github.workspace }}/MicroSIP-3.22.3.exe
