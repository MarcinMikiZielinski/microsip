name: Build MicroSIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32
  PLATFORM_TOOLSET: v143

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x86

      - name: Install Dependencies
        shell: pwsh
        run: |
          choco install 7zip -y
          choco install innosetup -y

      # -----------------------------
      # PJSIP DOWNLOAD
      # -----------------------------
      - name: Download PJSIP
        shell: pwsh
        run: |
          Write-Host "Downloading PJSIP..."

          $version = "2.15.1"
          $url = "https://github.com/pjsip/pjproject/archive/refs/tags/$version.zip"

          Invoke-WebRequest $url -OutFile pj.zip

          if (Test-Path "pjproject") {
            Remove-Item -Recurse -Force pjproject
          }

          Expand-Archive pj.zip -DestinationPath .

          $folder = Get-ChildItem -Directory | Where-Object {
            $_.Name -like "pjproject-$version*"
          } | Select-Object -First 1

          if (-not $folder) {
            throw "PJSIP folder not found"
          }

          Rename-Item $folder.FullName "pjproject"

      # -----------------------------
      # FIND SOLUTION FILE
      # -----------------------------
      - name: Find PJSIP solution
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path "pjproject" -Recurse -Filter "*.sln" |
                 Where-Object { $_.Name -like "*pjproject*" } |
                 Select-Object -First 1

          if (-not $sln) {
            Write-Host "DEBUG pjproject tree:"
            Get-ChildItem -Recurse pjproject | Select-Object FullName
            throw "PJSIP solution not found"
          }

          Write-Host "Solution: $($sln.FullName)"
          $sln.FullName | Out-File sln.txt

      # -----------------------------
      # PJSIP CONFIG (CI SAFE)
      # -----------------------------
      - name: Configure PJSIP
        shell: pwsh
        run: |
          Set-Location pjproject

          $configLines = @(
            "#ifndef __PJ_CONFIG_SITE_H__",
            "#define __PJ_CONFIG_SITE_H__",
            "",
            "#define PJ_CONFIG_MICROSIP 1",
            "",
            "#define PJMEDIA_HAS_VIDEO 1",
            "",
            "#define PJMEDIA_HAS_FFMPEG 0",
            "#define PJMEDIA_HAS_VPX 0",
            "",
            "#define PJMEDIA_HAS_OPUS 1",
            "#define PJMEDIA_HAS_SILK 1",
            "#define PJMEDIA_HAS_G722 1",
            "#define PJMEDIA_HAS_GSM 1",
            "#define PJMEDIA_HAS_G729 1",
            "#define PJMEDIA_HAS_G726 1",
            "#define PJMEDIA_HAS_ILBC 1",
            "",
            "#define PJMEDIA_HAS_SRTP 1",
            "#define PJMEDIA_HAS_TLS 1",
            "",
            "#define PJMEDIA_HAS_WEBRTC_AEC 1",
            "#define PJMEDIA_HAS_WEBRTC_VAD 1",
            "",
            "#include <pj/config_site_sample.h>",
            "",
            "#endif"
          )

          Set-Content -Path "pjlib/include/pj/config_site.h" `
            -Value ($configLines -join "`r`n")

      # -----------------------------
      # BUILD PJSIP
      # -----------------------------
      - name: Build PJSIP
        shell: pwsh
        run: |
          $sln = Get-Content sln.txt

          msbuild $sln `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /m

      # -----------------------------
      # BUILD MICRO SIP (NO SDK PINNING!)
      # -----------------------------
      - name: Build MicroSIP
        shell: pwsh
        run: |
          msbuild microsip.vcxproj `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:PlatformToolset=${{ env.PLATFORM_TOOLSET }} `
            /m

      # -----------------------------
      # OUTPUT
      # -----------------------------
      - name: Prepare Output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output | Out-Null

          if (Test-Path "Release/microsip.exe") {
            Copy-Item "Release/microsip.exe" output/
          } else {
            Write-Host "microsip.exe not found"
            Get-ChildItem -Recurse Release -ErrorAction SilentlyContinue
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: microsip-build
          path: output/

  # -----------------------------
  # INSTALLER
  # -----------------------------
  create-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: microsip-build
          path: output/

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          if (Test-Path $iscc) {
            & $iscc installer.iss
          } else {
            throw "Inno Setup not found"
          }

      - name: Upload Installer
        uses: actions/upload-artifact@v5
        with:
          name: microsip-installer
          path: "*.exe"
